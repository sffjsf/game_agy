<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>2D Battle Arena - 多角色战斗系统</title>
  <meta name="description" content="A 2D multi-character auto-battle system with 8 unique fighters">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;900&family=Noto+Sans+SC:wght@400;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css?v=5">
</head>
<body>

  <!-- ═══════════ Character Selection Screen ═══════════ -->
  <div id="select-screen" class="screen">
    <h1 class="game-title">⚔️ Battle Arena</h1>
    <p class="game-subtitle">选择你的战士</p>
    <div class="select-container">
      <div class="team-panel" id="left-panel">
        <h2 class="team-title">左方战士</h2>
        <div class="team-actions">
          <button id="left-select-all" class="btn-global">全部全选</button>
          <button id="left-clear-all" class="btn-global">全部清空</button>
        </div>
        <div class="character-grid" id="left-grid"></div>
      </div>
      <div class="vs-divider">
        <span>VS</span>
      </div>
      <div class="team-panel" id="right-panel">
        <h2 class="team-title">右方战士</h2>
        <div class="team-actions">
          <button id="right-select-all" class="btn-global">全部全选</button>
          <button id="right-clear-all" class="btn-global">全部清空</button>
        </div>
        <div class="character-grid" id="right-grid"></div>
      </div>
    </div>
    <div class="settings-container" style="display: flex; gap: 15px; align-items: center; justify-content: center; margin-top: 5px; margin-bottom: 5px;">
      <label for="arena-size-select" style="font-family: var(--font-cn); font-weight: 700; color: var(--text-dim); font-size: 0.95rem;">地图尺寸 (Battlefield Size):</label>
      <select id="arena-size-select" class="select-global">
        <option value="auto">🌟 智能自适应 (Auto-responsive)</option>
        <option value="800x600">800 × 600 (标准 Standard)</option>
        <option value="600x1000">600 × 1000 (竖屏 Portrait)</option>
        <option value="1024x768">1024 × 768 (经典 Classic)</option>
        <option value="1280x720">1280 × 720 (宽屏 720p)</option>
        <option value="1200x2000">1200 × 2000 (高清竖屏 HD Portrait)</option>
        <option value="1920x1080">1920 × 1080 (全高清 1080p)</option>
        <option value="custom">✏️ 自定义尺寸... (Custom Size...)</option>
      </select>
      <div id="custom-size-inputs" style="display: none; gap: 10px; align-items: center;">
        <input type="number" id="custom-width" placeholder="宽 (Width)" min="400" max="3840" value="1000" class="input-global" style="width: 100px;">
        <span style="color: var(--text-dim);">×</span>
        <input type="number" id="custom-height" placeholder="高 (Height)" min="300" max="2160" value="600" class="input-global" style="width: 100px;">
      </div>
    </div>
    <div style="display: flex; gap: 20px; justify-content: center; margin-top: 10px;">
      <button id="start-btn" class="btn-primary" disabled>选择角色开始战斗</button>
      <button id="open-codex-btn" class="btn-secondary">📖 英雄图鉴</button>
    </div>
  </div>

  <!-- ═══════════ Battle Screen ═══════════ -->
  <div id="battle-screen" class="screen" style="display:none">
    <div id="battle-hud">
      <div class="hud-fighter left-fighter">
        <span class="hud-name" id="left-name">---</span>
        <div class="hp-bar-outer">
          <div class="hp-bar-inner" id="left-hp-bar"></div>
        </div>
        <span class="hp-text" id="left-hp-text">100/100</span>
      </div>
      <div class="hud-vs">VS</div>
      <div class="hud-fighter right-fighter">
        <span class="hud-name" id="right-name">---</span>
        <div class="hp-bar-outer">
          <div class="hp-bar-inner" id="right-hp-bar"></div>
        </div>
        <span class="hp-text" id="right-hp-text">100/100</span>
      </div>
    </div>
    
    <!-- 战斗倍速控制器 -->
    <div id="speed-control" class="speed-control">
      <div class="speed-header">
        <span>战斗倍速</span>
        <span id="speed-display">1.0x</span>
      </div>
      <input type="range" id="speed-slider" min="0.1" max="3" step="0.1" value="1">
    </div>

    <div id="canvas-container">
      <div id="canvas-wrapper">
        <canvas id="battle-canvas"></canvas>
        <div id="countdown-overlay" style="display:none">
          <span id="countdown-text">3</span>
        </div>
      </div>
    </div>

    <!-- 缩放与平移控制器 -->
    <div id="zoom-controls" class="zoom-controls">
      <button id="zoom-out-btn" class="zoom-btn" title="缩小 (Zoom Out)">−</button>
      <span id="zoom-percentage">100%</span>
      <button id="zoom-in-btn" class="zoom-btn" title="放大 (Zoom In)">+</button>
      <button id="zoom-reset-btn" class="zoom-btn reset" title="重置/自适应 (Reset)">Reset</button>
    </div>
  </div>

  <!-- ═══════════ Result Screen ═══════════ -->
  <div id="result-screen" class="screen overlay" style="display:none">
    <div class="result-card">
      <h2 class="result-title" id="result-title">🏆 胜利!</h2>
      <p class="result-winner" id="result-winner">---</p>
      <p class="result-time" id="result-time">战斗时间: 0s</p>
      <div class="result-buttons">
        <button id="rematch-btn" class="btn-primary">⚔️ 再来一局</button>
        <button id="reselect-btn" class="btn-secondary">🔄 重新选择</button>
      </div>
    </div>
  </div>

  <!-- ═══════════ Codex Screen ═══════════ -->
  <div id="codex-screen" class="screen" style="display:none">
    <div class="codex-container">
      <div class="codex-header">
        <h1>英雄图鉴 (Hero Codex)</h1>
        <div class="codex-tabs">
          <button id="codex-tab-legendary" class="codex-tab-btn">👑 传说级 (Legends)</button>
          <button id="codex-tab-regular" class="codex-tab-btn active">普通战士 (Regulars)</button>
          <button id="codex-tab-hero" class="codex-tab-btn">⭐ 英雄角色 (Heroes)</button>
        </div>
        <button id="close-codex-btn" class="btn-secondary">返回主页 (Back)</button>
      </div>
      <div id="codex-grid" class="codex-grid"></div>
    </div>
  </div>

  <!-- ═══════════ Scripts (dependency order) ═══════════ -->
  <script type="module" src="js/main.js?v=3"></script>
</body>
</html>
